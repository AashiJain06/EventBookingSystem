spring.application.name=config-server

server.port=8888

spring.cloud.config.server.git.uri=https://github.com/AashiJain06/event-booking-config-repo.git

spring.cloud.config.server.git.clone-on-start=true
# If your GitHub repo uses the `main` branch (common on GitHub), set the default label here
# so the config server looks at the right branch. Change to `master` if necessary.
spring.cloud.config.server.git.default-label=main
eureka.instance.prefer-ip-address=true

# In Docker, point Eureka client to the Eureka service by its compose service name
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

